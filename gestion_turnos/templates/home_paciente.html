<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Inicio — {{ paciente }}</title>
        <style>
            * { box-sizing: border-box; margin: 0; padding: 0; }
            body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #1a1a1a; }
            .container { max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
            header { 
                margin-bottom: 1.5rem; 
                display: flex; 
                justify-content: space-between; 
                align-items: flex-start; 
            }
            header h1 { font-size: 20px; font-weight: 500; }
            header p  { font-size: 13px; color: #666; margin-top: 3px; }

            .btn-logout { 
                background: transparent; 
                border: 1px solid #a32d2d; 
                color: #a32d2d; 
                padding: 6px 12px; 
                border-radius: 6px; 
                font-size: 12px; 
                cursor: pointer; 
                transition: all 0.2s; 
            }
            .btn-logout:hover { 
                background: #a32d2d; 
                color: white; 
            }
            .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 1rem; }
            .alert-success { background: #e1f5ee; color: #085041; }
            .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
            .card { background: white; border: 0.5px solid #ddd; border-radius: 12px; padding: 1.25rem;
                    display:flex;
                    flex-direction: column;
                    justify-content:center;
                    align-items:center;
                    gap:.75rem;
                    text-align:center;
                    }
            .card h2 { font-size: 14px; font-weight: 500;}
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <div>
                    <h1>Bienvenido, {{ paciente }}</h1>
                </div>
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit" class="btn-logout">Cerrar sesión</button>
                </form>
            </header>

            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        </div>
</html>
