<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar sesión</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5;
           display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: white; border: 0.5px solid #ddd; border-radius: 12px;
            padding: 2rem; width: 100%; max-width: 360px; }
    h1 { font-size: 18px; font-weight: 500; margin-bottom: 1.5rem; }
    label { display: block; font-size: 12px; color: #666; margin-bottom: 3px; margin-top: 12px; }
    input { width: 100%; padding: 8px 10px; border: 0.5px solid #ccc;
            border-radius: 8px; font-size: 13px; }
    .btn { width: 100%; margin-top: 1.5rem; padding: 9px; background: #1a73c8;
           color: white; border: none; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .btn:hover { background: #1558a0; }
    .error { font-size: 12px; color: #a32d2d; margin-top: 8px; }
    
    /* NUEVO ESTILO: Para el enlace de registro */
    .enlace-registro { display: block; text-align: center; margin-top: 1.5rem; font-size: 13px; color: #666; text-decoration: none; }
    .enlace-registro strong { color: #1a73c8; transition: color 0.2s; }
    .enlace-registro:hover strong { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Iniciar sesión</h1>
    <form method="post">
      {% csrf_token %}
      <label>Usuario</label>
      {{ form.username }}
      <label>Contraseña</label>
      {{ form.password }}
      {% if form.errors %}
        <p class="error">Usuario o contraseña incorrectos.</p>
      {% endif %}
      <button type="submit" class="btn">Entrar</button>
    </form>

    <a href="{% url 'seleccionar_registro' %}" class="enlace-registro">
      ¿No tenés cuenta? <strong>Crear una cuenta</strong>
    </a>
  </div>
</body>
</html>
